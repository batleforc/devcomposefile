schemaVersion: 2.3.0
metadata:
  name: sample-stack
components:
  - name: ide
    container:
      image: quay.io/devfile/custom-udi:latest
      mountSources: true
      memoryLimit: 2Gi
  - name: web
    container:
      image: ghcr.io/example/web:2.0
      env:
        - name: APP_ENV
          value: staging
        - name: DEVFILE_GENERATED
          value: "true"
        - name: EXTRA_FLAG
          value: enabled
        - name: HTTP_PROXY
          value: https://proxy.internal
        - name: KEPT_VALUE
          value: yes
        - name: RUNTIME_FLAG
          value: applied
      endpoints:
        - name: port-3000
          targetPort: 3000
          exposure: public
      command:
        - /bin/sh
        - -lc
      args:
        - npm
        - run
        - dev
      mountSources: true
